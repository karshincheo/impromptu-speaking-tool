<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impromptu - Random Topic Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F3E8;
      --text: #1A3C34;
      --accent: #C4B5E8;
      --accent-bg: rgba(196, 181, 232, 0.35);
      --muted: rgba(26, 60, 52, 0.45);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Brand Badge ── */
    .brand-badge {
      position: fixed;
      top: 16px; right: 20px;
      display: flex; align-items: center; gap: 8px;
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      color: var(--text);
      opacity: 0.55;
      z-index: 100;
      text-decoration: none;
      pointer-events: none;
    }
    .brand-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
    }

    /* ── Page Layout ── */
    .page-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      gap: 64px;
    }

    /* ── Left: Intro ── */
    .intro-panel {
      display: flex; flex-direction: column;
      gap: 28px;
      flex-shrink: 0;
      max-width: 320px;
    }
    .title-wrap { position: relative; display: inline-block; }
    .title-main {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 3.6rem;
      line-height: 1.05;
      color: var(--text);
      display: block;
      position: relative;
      z-index: 1;
    }
    .title-bg {
      position: absolute;
      top: 30%; left: -6px; right: -6px; bottom: -4px;
      background: var(--accent-bg);
      border-radius: 6px;
      z-index: 0;
    }
    .steps-list {
      font-family: 'Caveat', cursive;
      font-size: 1.45rem;
      color: var(--text);
      opacity: 0.68;
      line-height: 2;
    }

    /* ── Center: Reel ── */
    .reel-panel {
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      flex-shrink: 0;
    }
    .topic-window {
      width: 440px; height: 390px;
      overflow: hidden;
      position: relative;
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%, rgba(0,0,0,0.2) 12%,
        black 30%, black 70%,
        rgba(0,0,0,0.2) 88%, transparent 100%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0%, rgba(0,0,0,0.2) 12%,
        black 30%, black 70%,
        rgba(0,0,0,0.2) 88%, transparent 100%
      );
    }
    .reel-strip {
      display: flex; flex-direction: column;
      will-change: transform;
    }
    .reel-item {
      height: 130px;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      font-family: 'DM Serif Display', serif;
      font-size: 5rem;
      color: var(--text);
      padding: 0 20px;
      flex-shrink: 0;
      word-break: break-word;
      transition: none;
      transform-origin: center center;
    }

    /* ── Buttons ── */
    .reel-controls {
      display: flex; gap: 12px; align-items: center;
    }
    .btn-primary {
      background: var(--text); color: var(--bg);
      border: none;
      padding: 12px 30px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.14s;
    }
    .btn-primary:hover:not(:disabled) { background: #2a5a4a; transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }

    .btn-outline {
      background: transparent; color: var(--text);
      border: 1.5px solid var(--text);
      padding: 11px 26px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.18s, transform 0.14s;
    }
    .btn-outline:hover { background: rgba(26,60,52,0.06); transform: translateY(-1px); }

    /* ── Right: Lever ── */
    .lever-section {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .pull-hint {
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      color: var(--text); opacity: 0.45;
      text-align: center; line-height: 1.35;
      transition: opacity 0.4s;
    }
    .pull-hint.hidden { opacity: 0; pointer-events: none; }

    .lever-wrap {
      position: relative;
      width: 50px; height: 175px;
    }
    #handleArm {
      position: absolute;
      bottom: 8px; left: 50%;
      width: 3px; height: 135px;
      background: var(--text);
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(0deg);
      border-radius: 2px;
      transition: none;
      cursor: grab;
    }
    #handleArm.hint { animation: leverHint 1.8s ease-in-out 1s forwards; }
    @keyframes leverHint {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      30% { transform: translateX(-50%) rotate(50deg); }
      60% { transform: translateX(-50%) rotate(35deg); }
    }
    #handleArm.spring-back {
      transition: transform 0.55s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
    #handleArm.disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    #handleArm.grabbing { cursor: grabbing; }

    #handleKnob {
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 4px 12px rgba(26,60,52,0.22);
      cursor: grab;
      touch-action: none;
      user-select: none;
      transition: box-shadow 0.2s;
    }
    #handleKnob:hover { box-shadow: 0 5px 16px rgba(26,60,52,0.3); }

    .lever-pivot {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--text);
    }

    /* ── Mobile FAB ── */
    .mobile-fab {
      display: none;
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      border: none;
      padding: 16px 44px;
      border-radius: 100px;
      font-size: 1.1rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(26,60,52,0.35);
      z-index: 50;
    }
    .mobile-fab:active { transform: translateX(-50%) scale(0.97); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .page-main { gap: 40px; }
      .intro-panel { max-width: 260px; }
      .topic-window { width: 360px; }
    }
    @media (max-width: 768px) {
      .page-main { flex-direction: column; gap: 24px; padding: 64px 16px 96px; align-items: center; }
      .lever-section { display: none; }
      .intro-panel { max-width: 100%; align-items: center; text-align: center; }
      .topic-window { width: 320px; height: 320px; }
      .reel-item { height: 120px; font-size: 2.6rem; }
      .title-main { font-size: 2.8rem; }
      .mobile-fab { display: block; }
      .reel-controls .btn-primary { display: none; }
    }
    @media (max-width: 480px) {
      .topic-window { width: 290px; height: 280px; }
      .reel-item { height: 100px; font-size: 2rem; }
      .title-main { font-size: 2.2rem; }
      .steps-list { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="brand-badge">
    Baby steps to the mic
    <div class="brand-dot"></div>
  </div>

  <main class="page-main">

    <!-- Left -->
    <div class="intro-panel">
      <div class="title-wrap">
        <div class="title-bg"></div>
        <span class="title-main">Impromptu<br>Speaking</span>
      </div>
      <div class="steps-list">
        1) Get random topic<br>
        2) Set 1 min timer<br>
        3) Record &amp; speak :)

    <!-- Center -->
    <div class="reel-panel">

      </div>
      <div class="reel-controls">
        <button class="btn-primary" id="desktopSpinBtn">Spin!</button>
        <a href="timer.html" class="btn-outline timer-btn-desktop timer-btn-mobile">Start Timer →</a>
      </div>
    </div>

    <!-- Right: Lever -->
    <div class="lever-section">
      <div class="pull-hint" id="pullLeverHint">pull lever<br>↓</div>

        <div id="handleArm">
          <div id="handleKnob"></div>
        </div>
        <div class="lever-pivot"></div>

  </main>

  <button class="mobile-fab" id="mobileSpinBtn">Spin!</button>

  <script>
    // ── Audio Engine ──────────────────────────────────────────────
    let audioCtx = null;
    function ensureAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTick(progress) {
      ensureAudioContext();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const freq = 1800 - progress * 900;
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.6, now + 0.04);
      filter.type = 'bandpass'; filter.frequency.setValueAtTime(2500, now); filter.Q.setValueAtTime(2, now);
      const vol = 0.08 + (1 - progress) * 0.06;
      gain.gain.setValueAtTime(vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.06);
    }
    function playLand() {
      ensureAudioContext();
      const now = audioCtx.currentTime;
      [[880,0,0.15,0.6],[1320,0.06,0.1,0.5],[1760,0.1,0.06,0.45]].forEach(([freq,delay,vol,dur]) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + delay);
        gain.gain.setValueAtTime(delay === 0 ? vol : 0, now);
        if (delay > 0) gain.gain.linearRampToValueAtTime(vol, now + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + dur + 0.05);
      });
    }
    function playHandleClunk() {
      ensureAudioContext();
      const now = audioCtx.currentTime;
      const bufSz = audioCtx.sampleRate * 0.05;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSz);
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(600, now);
      const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      noise.start(now); noise.stop(now + 0.06);
    }

    // ── Topics ───────────────────────────────────────────────────

      "Building bridges","The word \u201Cwhy\u201D","The word \u201Cbecause\u201D","Being present","Multitasking",
      "Daydreaming","Night walks","Private victories","Public failures",
      "Discipline when no one is watching","Being the backup plan","The feeling of progress",
      "The illusion of progress","Hidden talent","Untapped potential","Loyalty to yourself",

      "Being dependable","Being unpredictable","Learning to rest","Earning trust","Breaking trust",

    ];

    // ── State ─────────────────────────────────────────────────────
    let isSpinning = false, lastTopicIndex = -1, animFrameId = null;

    function getItemHeight() {
      return window.innerWidth <= 480 ? 100 : window.innerWidth <= 768 ? 120 : 130;
    }
    function shuffleArray(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function fitTextToWidth(items, maxW) {
      const w = window.innerWidth;
      const maxFs = w <= 480 ? 2.0 : w <= 768 ? 2.6 : 5.0;
      const minFs = w <= 480 ? 1.2 : w <= 768 ? 1.5 : 2.0;
      Array.from(items).forEach(item => {
        item.style.fontSize = maxFs + 'rem';
        if (item.scrollWidth > maxW) {
          let fs = maxFs;
          while (fs > minFs && item.scrollWidth > maxW) { fs -= 0.15; item.style.fontSize = fs + 'rem'; }
        }
      });
    }
    function getRandomIndex(exclude) {
      let idx;
      do { idx = Math.floor(Math.random() * topics.length); } while (idx === exclude);
      return idx;
    }

    // ── Spin ──────────────────────────────────────────────────────
    function generateTopic(initialVelocity) {
      if (isSpinning) return;
      isSpinning = true;
      if (animFrameId) cancelAnimationFrame(animFrameId);
      ensureAudioContext();

      const strip = document.getElementById('reelStrip');
      const win = document.getElementById('topicWindow');
      const arm = document.getElementById('handleArm');
      const mobBtn = document.getElementById('mobileSpinBtn');
      const deskBtn = document.getElementById('desktopSpinBtn');

      if (arm) arm.classList.add('disabled');
      if (mobBtn) mobBtn.disabled = true;
      if (deskBtn) deskBtn.disabled = true;

      const IH = getItemHeight();
      const WH = win.offsetHeight;
      const IV = initialVelocity || 40;
      const FRICTION = 0.985;
      const THRESH = 1.5;

      let simV = IV, simD = 0;
      while (simV >= THRESH) { simD += simV; simV *= FRICTION; }

      const naturalIdx = Math.round((simD + WH / 2 - IH / 2) / IH);
      const LAND_IDX = naturalIdx + 1;
      const COUNT = LAND_IDX + 3;

      const finalIdx = getRandomIndex(lastTopicIndex);
      lastTopicIndex = finalIdx;
      const finalTopic = topics[finalIdx];

      let reelTopics = [];
      while (reelTopics.length < COUNT) reelTopics = reelTopics.concat(shuffleArray(topics));
      reelTopics = reelTopics.slice(0, COUNT);
      reelTopics[LAND_IDX] = finalTopic;

      const TARGET_Y = -(LAND_IDX * IH + IH / 2 - WH / 2);
      strip.innerHTML = '';
      strip.classList.remove('settled');
      strip.style.transition = '';
      strip.style.transform = 'translateY(0px)';

      reelTopics.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'reel-item';
        div.style.height = IH + 'px';
        div.textContent = t;
        if (i === LAND_IDX) div.setAttribute('data-landing', 'true');
        strip.appendChild(div);
      });
      fitTextToWidth(strip.children, win.offsetWidth - 32);

      function styleItems(y) {
        const vc = WH / 2;
        Array.from(strip.children).forEach((item, i) => {
          const ic = i * IH + IH / 2 + y;
          const norm = Math.min(Math.abs(ic - vc) / IH, 1);
          item.style.transform = 'scale(' + (1.6 - norm * 0.6) + ')';
          item.style.opacity = 1 - norm * 0.7;
        });
      }

      let pos = 0, vel = IV, lastBnd = 0, lastFrame = null;

      function animate(ts) {
        if (lastFrame === null) lastFrame = ts;
        const dt = Math.min((ts - lastFrame) / 16.667, 3);
        lastFrame = ts;
        if (dt === 0) { animFrameId = requestAnimationFrame(animate); return; }
        pos += vel * dt;
        vel *= Math.pow(FRICTION, dt);
        strip.style.transform = 'translateY(' + (-pos) + 'px)';
        styleItems(-pos);
        const bIdx = Math.floor(pos / IH);
        if (bIdx > lastBnd) { playTick(Math.min(1 - vel / IV, 0.95)); lastBnd = bIdx; }
        if (vel < THRESH) { snapToTarget(); return; }
        animFrameId = requestAnimationFrame(animate);
      }

      function snapToTarget() {
        const startY = -pos, dist = TARGET_Y - startY;
        const t0 = performance.now(), dur = 650;
        function spring(now) {
          const t = Math.min((now - t0) / dur, 1);
          const s = 1 - Math.exp(-7 * t) * Math.cos(5 * t);
          const y = startY + dist * s;
          strip.style.transform = 'translateY(' + y + 'px)';
          styleItems(y);
          if (t < 1) { animFrameId = requestAnimationFrame(spring); }
          else { strip.style.transform = 'translateY(' + TARGET_Y + 'px)'; onSettle(); }
        }
        animFrameId = requestAnimationFrame(spring);
      }

      function onSettle() {
        strip.classList.add('settled');
        const landing = strip.querySelector('[data-landing="true"]');
        if (landing) {
          landing.classList.add('landed');
          const topicText = landing.textContent.trim();
          const url = 'timer.html?topic=' + encodeURIComponent(topicText);
          document.querySelectorAll('.timer-btn-desktop, .timer-btn-mobile').forEach(el => el.href = url);
          sessionStorage.setItem('speechTopic', topicText);
        }
        playLand();
        if (arm) arm.classList.remove('disabled');
        if (mobBtn) mobBtn.disabled = false;
        if (deskBtn) deskBtn.disabled = false;
        isSpinning = false;
      }

      animFrameId = requestAnimationFrame(animate);
    }

    // ── Lever ─────────────────────────────────────────────────────
    (function initLever() {
      const arm = document.getElementById('handleArm');
      const knob = document.getElementById('handleKnob');
      if (!arm || !knob) return;

      const MAX_ANGLE = 180, DRAG_SENS = 280;
      arm.classList.add('hint');
      arm.addEventListener('animationend', () => arm.classList.remove('hint'), { once: true });

      let isDragging = false, startY = 0, currentAngle = 0, hasMoved = false;

      knob.addEventListener('pointerdown', e => {
        if (isSpinning || arm.classList.contains('disabled')) return;
        e.preventDefault();
        knob.setPointerCapture(e.pointerId);
        isDragging = true; hasMoved = false; currentAngle = 0;
        arm.classList.add('grabbing');
        arm.classList.remove('hint', 'spring-back');
        arm.style.transition = '';
        const hint = document.getElementById('pullLeverHint');
        if (hint) hint.classList.add('hidden');
        startY = e.clientY;
        ensureAudioContext();
      });

      knob.addEventListener('pointermove', e => {
        if (!isDragging) return;
        const dy = Math.max(0, e.clientY - startY);
        if (dy > 3) hasMoved = true;
        currentAngle = Math.min(dy * (MAX_ANGLE / DRAG_SENS), MAX_ANGLE);
        arm.style.transform = 'translateX(-50%) rotate(' + currentAngle + 'deg)';
        const p = currentAngle / MAX_ANGLE;
        knob.style.boxShadow = '0 ' + (2 + p * 6) + 'px ' + (6 + p * 14) + 'px rgba(26,60,52,' + (0.2 + p * 0.2) + ')';
      });

      function handleRelease() {
        if (!isDragging) return;
        isDragging = false;
        arm.classList.remove('grabbing');
        knob.style.boxShadow = '';
        arm.classList.add('spring-back');
        arm.style.transform = 'translateX(-50%) rotate(0deg)';
        setTimeout(() => arm.classList.remove('spring-back'), 600);
        playHandleClunk();
        const vel = hasMoved || currentAngle > 0 ? 20 + Math.min(currentAngle / MAX_ANGLE, 1) * 35 : 25;
        generateTopic(vel);
        currentAngle = 0; hasMoved = false;
      }

      knob.addEventListener('pointerup', handleRelease);
      knob.addEventListener('pointercancel', handleRelease);
      document.addEventListener('pointerup', () => { if (isDragging) handleRelease(); });
    })();

    // ── Init Reel ─────────────────────────────────────────────────
    (function initReel() {
      const strip = document.getElementById('reelStrip');
      const win = document.getElementById('topicWindow');
      const IH = getItemHeight();
      const WH = win.offsetHeight;
      const initial = shuffleArray(topics).slice(0, 3);
      initial.forEach(t => {
        const div = document.createElement('div');
        div.className = 'reel-item';
        div.style.height = IH + 'px';
        div.textContent = t;
        strip.appendChild(div);
      });
      fitTextToWidth(strip.children, win.offsetWidth - 32);
      strip.style.transform = 'translateY(' + -(IH + IH / 2 - WH / 2) + 'px)';
      strip.classList.add('settled');
      if (strip.children[1]) strip.children[1].classList.add('landed');
    })();

    // ── Buttons ───────────────────────────────────────────────────
    document.getElementById('mobileSpinBtn').addEventListener('click', () => {
      if (isSpinning) return;
      ensureAudioContext(); playHandleClunk(); generateTopic(30);
    });
    document.getElementById('desktopSpinBtn').addEventListener('click', () => {
      if (isSpinning) return;
      ensureAudioContext(); playHandleClunk(); generateTopic(30);
    });
  </script>
</body>
